name: dbt docs -> GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-docs.yml"
  workflow_dispatch: {}

# Permisos para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Generar dbt docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Derivar variables PG* desde DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/parse_database_url.py >> "$GITHUB_ENV"

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt docs generate
        working-directory: dbt
        run: dbt docs generate

      - name: Subir artefacto de Pages (target/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target

  deploy-docs:
    name: Publicar en Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
